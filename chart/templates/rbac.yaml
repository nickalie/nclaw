{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nclaw.serviceAccountName" . }}
  labels:
    {{- include "nclaw.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nclaw.fullname" . }}
  labels:
    {{- include "nclaw.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.rbac.clusterRole }}
subjects:
  - kind: ServiceAccount
    name: {{ include "nclaw.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
