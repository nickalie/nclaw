{{- if .Values.env.webhookBaseDomain }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nclaw.fullname" . }}
  labels:
    {{- include "nclaw.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "nclaw.selectorLabels" . | nindent 4 }}
{{- end }}
