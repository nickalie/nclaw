image:
  repository: ghcr.io/nickalie/nclaw
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
#  - name: ghcr-credentials

initCredentials:
  enabled: true
  image:
    repository: busybox
    tag: latest

env:
  dataDir: /app/data
  # Telegram bot token — provide via secret or set directly
  telegramBotToken: ""
  # Comma-separated allowed chat IDs
  whitelistChatIds: ""
  # Base domain for webhook URLs
  webhookBaseDomain: ""
  # CLI backend: claude, claudish, codex, copilot, or gemini (empty = image default)
  cli: ""
  # Model for claudish (e.g. g@gemini-2.5-pro). Setting this auto-selects claudish
  model: ""
  # Claudish model tier overrides
  modelOpus: ""
  modelSonnet: ""
  modelHaiku: ""
  modelSubagent: ""

# Reference an existing secret for sensitive env vars
# Secret must contain key "telegram-bot-token"
existingSecret: ""

proxy:
  enabled: false
  httpProxy: ""
  httpsProxy: ""

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 100m
    memory: 128Mi

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  existingClaim: ""

rbac:
  # Create ServiceAccount and ClusterRoleBinding
  create: true
  # ClusterRole to bind (cluster-admin grants full access for kubectl)
  clusterRole: cluster-admin

# Claude credentials JSON to mount into /root/.claude/credentials.json
# Provide via secret — the key must be "credentials.json"
claudeCredentialsSecret: ""

# Codex credentials to mount into /root/.codex/auth.json
# Provide via secret — the key must be "auth.json"
codexCredentialsSecret: ""

# Copilot credentials to mount into /root/.copilot/config.json
# Provide via secret — the key must be "config.json"
copilotCredentialsSecret: ""

# Claudish API keys secret — keys are injected as env vars via envFrom.
# Use the provider's native env var name as the key (e.g. OPENROUTER_API_KEY, GEMINI_API_KEY).
claudishApiKeysSecret: ""
