name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Prepare dependencies
        run: |
          go mod tidy
          go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: |
          go mod tidy
          go mod download

      - name: Run tests
        run: CGO_ENABLED=1 go test -v ./...

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=main-{{date 'YYYYMMDDHHmmss'}}-{{sha}},enable={{is_default_branch}}
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Compute build metadata
        id: buildmeta
        run: |
          COMMIT=$(echo ${{ github.sha }} | cut -c1-7)
          DATE=$(date -u +%Y%m%d%H%M%S)
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "image-tag=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "image-tag=main-${DATE}-${COMMIT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.buildmeta.outputs.version }}
            COMMIT=${{ steps.buildmeta.outputs.commit }}
            BUILD_DATE=${{ steps.buildmeta.outputs.date }}
            BUILD_NUMBER=${{ github.run_number }}
            DOCKER_TAG=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    outputs:
      image-tag: ${{ steps.buildmeta.outputs.image-tag }}

  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GoReleaser
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/go/src/github.com/${{ github.repository }}" \
            -w "/go/src/github.com/${{ github.repository }}" \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e HOMEBREW_GITHUB_TOKEN="${{ secrets.HOMEBREW_GITHUB_TOKEN }}" \
            -e SCOOP_GITHUB_TOKEN="${{ secrets.SCOOP_GITHUB_TOKEN }}" \
            -e WINGET_GITHUB_TOKEN="${{ secrets.WINGET_GITHUB_TOKEN }}" \
            -e AUR_SSH_KEY="${{ secrets.AUR_SSH_KEY }}" \
            ghcr.io/goreleaser/goreleaser-cross:v1.25.7 \
            release --clean

  chocolatey:
    name: Chocolatey Push
    runs-on: windows-latest
    needs: [release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Download release artifact
        shell: bash
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern "nclaw_${{ steps.version.outputs.version }}_windows_amd64.zip" \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Chocolatey package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $zipPath = "nclaw_${version}_windows_amd64.zip"

          # Compute checksum
          $checksum = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash

          # Create package directory
          New-Item -ItemType Directory -Path "choco/tools" -Force | Out-Null

          # Create nuspec
          @"
          <?xml version="1.0" encoding="utf-8"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2015/06/nuspec.xsd">
            <metadata>
              <id>nclaw</id>
              <version>$version</version>
              <owners>nickalie</owners>
              <title>nclaw - AI Assistant powered by Claude Code</title>
              <authors>nickalie</authors>
              <summary>Lightweight, container-first AI assistant powered by Claude Code</summary>
              <projectUrl>https://github.com/nickalie/nclaw</projectUrl>
              <projectSourceUrl>https://github.com/nickalie/nclaw</projectSourceUrl>
              <packageSourceUrl>https://github.com/nickalie/nclaw</packageSourceUrl>
              <bugTrackerUrl>https://github.com/nickalie/nclaw/issues</bugTrackerUrl>
              <iconUrl>https://cdn.jsdelivr.net/gh/nickalie/nclaw@main/assets/icon.svg</iconUrl>
              <licenseUrl>https://github.com/nickalie/nclaw/blob/main/LICENSE</licenseUrl>
              <releaseNotes>https://github.com/nickalie/nclaw/releases/tag/v$version</releaseNotes>
              <tags>telegram bot claude ai assistant cli chatbot</tags>
              <description>Lightweight, container-first AI assistant powered by Claude Code, accessible through Telegram</description>
            </metadata>
          </package>
          "@ | Set-Content -Path "choco/nclaw.nuspec"

          # Create install script
          @"
          `$ErrorActionPreference = 'Stop'
          `$toolsDir = "`$(Split-Path -parent `$MyInvocation.MyCommand.Definition)"
          `$url = "https://github.com/nickalie/nclaw/releases/download/$tag/nclaw_${version}_windows_amd64.zip"
          `$packageArgs = @{
            packageName   = 'nclaw'
            unzipLocation = `$toolsDir
            url64bit      = `$url
            checksum64    = '$checksum'
            checksumType64= 'sha256'
          }
          Install-ChocolateyZipPackage @packageArgs
          "@ | Set-Content -Path "choco/tools/chocolateyinstall.ps1"

          # Pack
          choco pack "choco/nclaw.nuspec" --output-directory "choco"

      - name: Push to Chocolatey
        shell: pwsh
        run: |
          choco push "choco/nclaw.${{ steps.version.outputs.version }}.nupkg" --source https://push.chocolatey.org/ --api-key "${{ secrets.CHOCOLATEY_API_KEY }}"

  helm:
    name: Helm Chart Push
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package ./chart --version "${{ needs.docker.outputs.image-tag }}" --app-version "${{ needs.docker.outputs.image-tag }}"

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Push chart to GHCR
        run: helm push nclaw-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Add source annotation for GHCR repo linking
        run: |
          TAG="${{ needs.docker.outputs.image-tag }}"
          crane auth login ghcr.io -u ${{ github.actor }} -p "${{ secrets.GITHUB_TOKEN }}"
          crane mutate "ghcr.io/${{ github.repository_owner }}/charts/nclaw:${TAG}" \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}"

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [release, chocolatey, docker, helm]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
