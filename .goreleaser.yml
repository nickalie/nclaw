version: 2

builds:
  - id: nclaw
    main: ./cmd/nclaw
    binary: nclaw
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=x86_64-linux-gnu-gcc
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
      - goos: darwin
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=o64-clang
      - goos: darwin
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=oa64-clang
      - goos: windows
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=x86_64-w64-mingw32-gcc
    ldflags:
      - -s -w
      - -X github.com/nickalie/nclaw/internal/version.Version={{.Version}}
      - -X github.com/nickalie/nclaw/internal/version.Commit={{.ShortCommit}}
      - -X github.com/nickalie/nclaw/internal/version.BuildDate={{.Date}}

archives:
  - id: nclaw
    ids:
      - nclaw
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - id: nclaw
    package_name: nclaw
    ids:
      - nclaw
    vendor: nickalie
    homepage: https://github.com/nickalie/nclaw
    maintainer: nickalie
    description: Lightweight, container-first AI assistant powered by Claude Code, accessible through Telegram
    license: MIT
    formats:
      - deb
      - rpm
      - apk
      - archlinux

aurs:
  - name: nclaw-bin
    homepage: https://github.com/nickalie/nclaw
    description: Lightweight, container-first AI assistant powered by Claude Code, accessible through Telegram
    license: MIT
    maintainers:
      - nickalie
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/nclaw-bin.git"

homebrew_casks:
  - repository:
      owner: nickalie
      name: homebrew-apps
      token: "{{ .Env.HOMEBREW_GITHUB_TOKEN }}"
    homepage: https://github.com/nickalie/nclaw
    description: Lightweight, container-first AI assistant powered by Claude Code, accessible through Telegram
    license: MIT

scoops:
  - repository:
      owner: nickalie
      name: scoop-bucket
      token: "{{ .Env.SCOOP_GITHUB_TOKEN }}"
    homepage: https://github.com/nickalie/nclaw
    description: Lightweight, container-first AI assistant powered by Claude Code, accessible through Telegram
    license: MIT


winget:
  - publisher: nickalie
    short_description: Lightweight, container-first AI assistant powered by Claude Code, accessible through Telegram
    license: MIT
    publisher_url: https://github.com/nickalie
    homepage: https://github.com/nickalie/nclaw
    repository:
      owner: nickalie
      name: winget-pkgs
      branch: nclaw-{{.Version}}
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
