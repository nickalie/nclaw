version: 2

builds:
  - id: nclaw
    main: ./cmd/nclaw
    binary: nclaw
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=x86_64-linux-gnu-gcc
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
      - goos: darwin
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=o64-clang
      - goos: darwin
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=oa64-clang
      - goos: windows
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=x86_64-w64-mingw32-gcc
    ldflags:
      - -s -w
      - -X github.com/nickalie/nclaw/internal/version.Version={{.Version}}
      - -X github.com/nickalie/nclaw/internal/version.Commit={{.ShortCommit}}
      - -X github.com/nickalie/nclaw/internal/version.BuildDate={{.Date}}

archives:
  - id: nclaw
    builds:
      - nclaw
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - id: nclaw
    package_name: nclaw
    builds:
      - nclaw
    vendor: nickalie
    homepage: https://github.com/nickalie/nclaw
    maintainer: nickalie
    description: Telegram bot wrapping Claude Code CLI
    license: MIT
    formats:
      - deb
      - rpm
